<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>trible-rootz.. Store</title>
  <link rel="stylesheet" href="style.css">

  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>

<header>
  <h1>trible-rootz..</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Shop</a>
    <a href="#cart">Cart 🛒</a>
  </nav>
</header>

<section class="hero">
  <h2 data-aos="fade-up">Authentic Bastar Art</h2>
  <p data-aos="fade-up">Handcrafted Wooden & Tribal Creations</p>
</section>

<section id="products" class="products">

  <div class="card" data-aos="zoom-in">
    <img src="images/product1.jpg">
    <h3>Wooden Mask</h3>
    <p>₹999</p>
    <button onclick="addToCart('Wooden Mask', 999)">Add to Cart</button>
  </div>

  <div class="card" data-aos="zoom-in">
    <img src="images/product2.jpg">
    <h3>Dhokra Art</h3>
    <p>₹1499</p>
    <button onclick="addToCart('Dhokra Art', 1499)">Add to Cart</button>
  </div>

</section>

<!-- CART -->
<section id="cart" class="cart-section">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
  <button onclick="checkout()">Proceed to Payment</button>
</section>

<!-- PAYMENT MODAL -->
<div id="paymentModal" class="modal">
  <div class="modal-content">
    <h2>Payment</h2>
    <input type="text" placeholder="Card Number">
    <input type="text" placeholder="Expiry Date">
    <input type="text" placeholder="CVV">
    <button onclick="payNow()">Pay Now</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="script.js"></script>

<script>
  AOS.init();
</script>

</body>
</html>
<script>
let total = 0;

function addToCart(price) {
  total += price;
  document.getElementById("cart-total").innerText = "₹" + total;
}
</script>
<footer>
  <p>© 2026 Your Brand | Contact: your@email.com</p>
</footer>
<button onclick="alert('Payment feature coming soon')">
  Proceed to Payment
</button>
